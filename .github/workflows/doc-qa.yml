name: Doc QA

on:
  push:
    branches: [master]
    paths:
      - "src/doc-qa/**"
      - "shared/config.py"
      - "scripts/eval/**"
      - "env/config/application.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [ingestion, api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd src/doc-qa/${{ matrix.component }}
          pip install -r requirements-dev.txt
      - name: Run tests
        run: |
          cd src/doc-qa/${{ matrix.component }}
          PYTHONPATH=.:../../../shared pytest -v tests/

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: ingestion
            image: doc-qa-ingestion
            deploy_cmd: gcloud run jobs update doc-qa-ingestion --image $IMAGE --region asia-northeast1
          - component: api
            image: doc-qa-api
            deploy_cmd: gcloud run services update doc-qa-api --image $IMAGE --region asia-northeast1
          - component: pipeline
            image: doc-qa-eval
            deploy_cmd: gcloud run jobs update doc-qa-eval --image $IMAGE --region asia-northeast1
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Configure Docker
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet
      - name: Build and Push
        run: |
          IMAGE=asia-northeast1-docker.pkg.dev/mlops-dev-a/mlops-dev-a-docker/${{ matrix.image }}:latest
          docker build -f src/doc-qa/${{ matrix.component }}/Dockerfile -t $IMAGE .
          docker push $IMAGE
      - name: Deploy
        run: |
          IMAGE=asia-northeast1-docker.pkg.dev/mlops-dev-a/mlops-dev-a-docker/${{ matrix.image }}:latest
          ${{ matrix.deploy_cmd }}

  # Vertex AI Pipeline スケジュール作成/更新（冪等）
  # build-and-deploy で doc-qa-eval イメージ push 後に実行
  deploy-pipeline:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install KFP dependencies
        run: pip install -r src/doc-qa/pipeline/requirements.txt
      - name: Compile pipeline
        run: |
          cd src/doc-qa/pipeline
          python run_pipeline.py compile --output eval_pipeline.json
      - name: Upload pipeline JSON to GCS
        run: |
          gsutil cp src/doc-qa/pipeline/eval_pipeline.json \
            gs://mlops-dev-a-doc-qa/pipeline-artifacts/eval_pipeline.json
      - name: Create/update Vertex AI Pipeline schedule
        env:
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
        run: |
          cd src/doc-qa/pipeline
          python run_pipeline.py schedule \
            --template-path gs://mlops-dev-a-doc-qa/pipeline-artifacts/eval_pipeline.json
